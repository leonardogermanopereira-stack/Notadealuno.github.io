<HTML lang="pt-br">
<head>
  <metacharset="UTF-8">

<title>Controle de Notas</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arnaldo, Helênica, sand-serif;
  }
  body{
    background:#f2f2f2;
  }
  .container{
    width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    h1{
      text-align:center;
      margin-botton:20px;
      color:#004080;
    }
    .formulario{
      display:grid;
      grid-template-columns::2fr repeat(4,1fr) auto;
      gap:10px;
      margin-bottom:25px;
    }
    input{
      padding:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }
    button{
      background:#007bff,
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }
    button:hover{
      background:#0056b3;
    }
    table{{


      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#004080;
      color:white;
      padding:10px;
      border-bottom:1px solid #ddd;
    }
    .aprovado{
      color:green;
      font-weight:bold;
    }
    .reprovado{
      color:red;
      font-weight:bold;
    }
    </style>
